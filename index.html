<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>coa</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #0b1f4d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--ink);
      cursor: crosshair;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: fixed;
      inset: 0;
    }
    .label {
      position: fixed;
      left: 24px;
      bottom: 20px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #94a8d6;
      pointer-events: none;
      user-select: none;
      z-index: 2;
    }
  </style>
</head>
<body>
  <canvas id="ascii"></canvas>
  <div class="label">move cursor</div>

  <script>
    (function () {
      const canvas = document.getElementById('ascii');
      const ctx = canvas.getContext('2d');

      const CHARS = ' ·∙•◦○◉●';
      const COLORS = [
        'rgba(230, 238, 252, 1)',
        'rgba(193, 213, 245, 1)',
        'rgba(141, 173, 232, 1)',
        'rgba(82, 121, 219, 1)',
        'rgba(37, 71, 217, 1)',
        'rgba(15, 36, 138, 1)',
        'rgba(10, 24, 92, 1)'
      ];

      const CHAR_W = 10;
      const CHAR_H = 14;
      const FONT_SIZE = 13;

      let dpr = Math.max(1, window.devicePixelRatio || 1);
      let width = 0, height = 0, cols = 0, rows = 0;
      let mouseX = -9999, mouseY = -9999;
      let targetX = -9999, targetY = -9999;

      const RADIUS = 180;

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        dpr = Math.max(1, window.devicePixelRatio || 1);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        cols = Math.ceil(width / CHAR_W);
        rows = Math.ceil(height / CHAR_H);
        ctx.font = FONT_SIZE + 'px "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.textBaseline = 'top';
      }

      function onMove(e) {
        const t = e.touches ? e.touches[0] : e;
        targetX = t.clientX;
        targetY = t.clientY;
      }
      function onLeave() {
        targetX = -9999;
        targetY = -9999;
      }

      window.addEventListener('resize', resize);
      window.addEventListener('mousemove', onMove, { passive: true });
      window.addEventListener('touchmove', onMove, { passive: true });
      window.addEventListener('mouseleave', onLeave);
      window.addEventListener('blur', onLeave);

      resize();

      function draw() {
        if (mouseX === -9999) { mouseX = targetX; mouseY = targetY; }
        else {
          mouseX += (targetX - mouseX) * 0.18;
          mouseY += (targetY - mouseY) * 0.18;
        }

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);

        const r2 = RADIUS * RADIUS;
        const lastChar = CHARS.length - 1;
        const lastColor = COLORS.length - 1;

        ctx.fillStyle = 'rgba(220, 230, 248, 1)';
        for (let y = 0; y < rows; y += 2) {
          for (let x = 0; x < cols; x += 2) {
            ctx.fillText('·', x * CHAR_W, y * CHAR_H);
          }
        }

        if (mouseX > -1000) {
          const minCol = Math.max(0, Math.floor((mouseX - RADIUS) / CHAR_W));
          const maxCol = Math.min(cols, Math.ceil((mouseX + RADIUS) / CHAR_W));
          const minRow = Math.max(0, Math.floor((mouseY - RADIUS) / CHAR_H));
          const maxRow = Math.min(rows, Math.ceil((mouseY + RADIUS) / CHAR_H));

          for (let y = minRow; y < maxRow; y++) {
            const py = y * CHAR_H + CHAR_H * 0.5;
            for (let x = minCol; x < maxCol; x++) {
              const px = x * CHAR_W + CHAR_W * 0.5;
              const dx = px - mouseX;
              const dy = py - mouseY;
              const d2 = dx * dx + dy * dy;
              if (d2 > r2) continue;
              const d = Math.sqrt(d2);
              let t = 1 - d / RADIUS;
              t = t * t * (3 - 2 * t);

              const ci = Math.min(lastChar, Math.round(t * lastChar));
              if (ci === 0) continue;
              const col = Math.min(lastColor, Math.round(t * lastColor));
              ctx.fillStyle = COLORS[col];
              ctx.fillText(CHARS[ci], x * CHAR_W, y * CHAR_H);
            }
          }
        }

        requestAnimationFrame(draw);
      }

      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>

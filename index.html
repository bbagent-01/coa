<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>coa</title>
  <style>
    :root { --bg: #ffffff; --ink: #2a3b6b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--ink);
      cursor: crosshair;
    }
    canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }
    #face { display: none; }
    /* Radial fade: face center is clear, edges dissolve into the flat
       background (hides ears + removes the hard silhouette). Color MUST
       match the WebGL scene background. */
    #vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; display: none;
      background: radial-gradient(ellipse 34% 56% at 50% 42%,
        rgba(238,243,251,0) 26%,
        rgba(238,243,251,0.95) 56%,
        rgba(238,243,251,1) 80%);
    }
    .pupil {
      position: fixed; z-index: 2; display: none;
      border-radius: 50%; background: #1b2a4d;
      pointer-events: none; transform: translate(-50%, -50%);
    }
    .label {
      position: fixed; left: 20px; bottom: 18px;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: #6b8ad0; user-select: none; z-index: 2;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid #e2e7f2;
      border-radius: 8px;
      padding: 6px 12px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .nav {
      position: fixed; left: 20px; top: 18px; z-index: 3;
      display: inline-flex; gap: 14px; align-items: center;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      user-select: none;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid #e2e7f2;
      border-radius: 8px;
      padding: 8px 14px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .nav button {
      background: transparent; border: none; padding: 0;
      font: inherit; letter-spacing: inherit; text-transform: inherit;
      color: #aebbd9; cursor: pointer;
      transition: color 0.15s ease;
    }
    .nav button:hover { color: #6b8ad0; }
    .nav button.active { color: #2547d9; }
    .nav .sep { color: #d6dcec; }
    .nav .model-picker { display: none; gap: 12px; align-items: center; }
    .nav .model-picker button { font-size: 10px; opacity: 0.85; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="ascii"></canvas>
  <canvas id="face"></canvas>
  <div id="vignette"></div>
  <div id="pupilL" class="pupil"></div>
  <div id="pupilR" class="pupil"></div>
  <nav class="nav">
    <button data-mode="cursor" class="active">01 · cursor</button>
    <button data-mode="face">02 · face</button>
  </nav>
  <div class="label" id="label">coa · cursor</div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
    import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    {
      const canvas = document.getElementById('ascii');
      const ctx = canvas.getContext('2d');

      // ---- Character pool: SQL keywords, code symbols, hex ----
      const SQL_TOKENS = [
        'SELECT','FROM','WHERE','JOIN','LEFT','RIGHT','INNER','OUTER','ON','AS',
        'GROUP','ORDER','BY','LIMIT','OFFSET','HAVING','UNION','DISTINCT',
        'INSERT','UPDATE','DELETE','CREATE','TABLE','VIEW','INDEX','WITH',
        'AND','OR','NOT','NULL','IS','IN','LIKE','BETWEEN','CASE','WHEN','THEN','ELSE','END',
        'COUNT','SUM','AVG','MIN','MAX','CAST','COALESCE','EXISTS'
      ];
      const SYMBOLS = '{}[]()<>;,.=+-*/_:|&%@#$!?\\"\'`~^';
      const HEX = '0123456789abcdef';
      const LETTERS = 'abcdefghijklmnopqrstuvwxyz';

      // Build a flat char pool weighted toward symbols + hex (Matrix-y feel),
      // and a list of multi-char SQL snippets we'll occasionally stamp across cells.
      const CHAR_POOL = [];
      for (let i = 0; i < 3; i++) for (const c of SYMBOLS) CHAR_POOL.push(c);
      for (let i = 0; i < 2; i++) for (const c of HEX) CHAR_POOL.push(c);
      for (let i = 0; i < 1; i++) for (const c of LETTERS) CHAR_POOL.push(c);
      const SNIPPETS = [
        'SELECT * FROM','WHERE id =','JOIN ON','GROUP BY','ORDER BY DESC',
        'COUNT(*)','IS NULL','LIMIT 100','CREATE TABLE','INSERT INTO',
        'NOT NULL','LEFT JOIN','UNION ALL','CASE WHEN','COALESCE(','AS coa',
        'WITH cte AS','SUM(amount)','AVG(price)','HAVING COUNT'
      ];

      function pickChar() {
        return CHAR_POOL[(Math.random() * CHAR_POOL.length) | 0];
      }

      // ---- Color ramp: light powder → mid blue (no dark / no navy) ----
      // Lower indices = paler. Highest still feels soft.
      const COLORS = [
        'rgba(225, 234, 250, 1)',
        'rgba(206, 220, 246, 1)',
        'rgba(180, 201, 240, 1)',
        'rgba(151, 179, 232, 1)',
        'rgba(124, 158, 222, 1)',
        'rgba(102, 140, 212, 1)',
        'rgba(86, 124, 200, 1)'
      ];

      // ---- Grid: tight 9pt characters for cursor mode ----
      const CHAR_W = 6;
      const CHAR_H = 9;
      const FONT_SIZE = 9;
      // ---- Denser grid for head mode (much finer detail) ----
      const HEAD_CHAR_W = 4;
      const HEAD_CHAR_H = 6;
      const HEAD_FONT_SIZE = 6;
      let headCols = 0, headRows = 0;
      let headCells = null;

      let dpr = Math.max(1, window.devicePixelRatio || 1);
      let width = 0, height = 0, cols = 0, rows = 0;
      let cells = [];                          // per-cell state
      let mouseX = -9999, mouseY = -9999;
      let prevMouseX = -9999, prevMouseY = -9999;
      let targetX = -9999, targetY = -9999;
      let trail = [];                          // history of mouse points
      const TRAIL_MS = 1100;                   // tail lifetime
      const TRAIL_MAX = 26;                    // hard cap
      const RADIUS = 210;                      // base blob radius
      const RADIUS2 = RADIUS * RADIUS;
      const HEAD_RADIUS = 240;                 // wobble field extent
      const HEAD_RADIUS2 = HEAD_RADIUS * HEAD_RADIUS;

      function buildCells() {
        cells = new Array(cols * rows);
        for (let i = 0; i < cells.length; i++) {
          cells[i] = {
            ch: pickChar(),
            phase: Math.random() * Math.PI * 2,
            swap: 0.004 + Math.random() * 0.018, // baseline char-swap probability per frame
            stick: 0                              // snippet stickiness (frames remaining before allowed to swap)
          };
        }
        // Sprinkle a handful of SQL snippets across the grid for flavor.
        const targetSnippets = Math.max(8, Math.floor((cols * rows) / 4000));
        for (let s = 0; s < targetSnippets; s++) stampSnippet();
      }

      function stampSnippet() {
        const snip = SNIPPETS[(Math.random() * SNIPPETS.length) | 0];
        const startX = Math.floor(Math.random() * Math.max(1, cols - snip.length));
        const y = Math.floor(Math.random() * rows);
        for (let i = 0; i < snip.length; i++) {
          const idx = y * cols + (startX + i);
          if (!cells[idx]) continue;
          cells[idx].ch = snip[i];
          cells[idx].stick = 240 + Math.floor(Math.random() * 240); // hold for a few seconds
        }
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        dpr = Math.max(1, window.devicePixelRatio || 1);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        cols = Math.ceil(width / CHAR_W) + 1;
        rows = Math.ceil(height / CHAR_H) + 1;
        ctx.font = FONT_SIZE + 'px "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.textBaseline = 'top';
        buildCells();
        // Head grid (denser) — rebuilt when canvas resizes
        headCols = Math.ceil(width / HEAD_CHAR_W) + 1;
        headRows = Math.ceil(height / HEAD_CHAR_H) + 1;
        headCells = new Array(headCols * headRows);
        for (let i = 0; i < headCells.length; i++) {
          headCells[i] = {
            ch: pickChar(),
            phase: Math.random() * Math.PI * 2,
            swap: 0.005 + Math.random() * 0.020
          };
        }
      }

      function onMove(e) {
        const t = e.touches ? e.touches[0] : e;
        targetX = t.clientX;
        targetY = t.clientY;
      }
      function onLeave() {
        targetX = -9999;
        targetY = -9999;
      }

      window.addEventListener('resize', resize);
      window.addEventListener('mousemove', onMove, { passive: true });
      window.addEventListener('touchmove', onMove, { passive: true });
      window.addEventListener('mouseleave', onLeave);
      window.addEventListener('blur', onLeave);

      resize();

      let lastSnippetStamp = 0;
      let frame = 0;
      let mode = 'cursor';

      function drawCursor(now) {
        frame++;

        // Smooth follow (slower so trail extends behind during motion)
        if (mouseX === -9999) { mouseX = targetX; mouseY = targetY; prevMouseX = mouseX; prevMouseY = mouseY; }
        else if (targetX > -1000) {
          prevMouseX = mouseX; prevMouseY = mouseY;
          mouseX += (targetX - mouseX) * 0.16;
          mouseY += (targetY - mouseY) * 0.16;
        }

        // Push current mouse position into trail, with jitter so resting
        // blob still shifts shape from frame to frame.
        if (targetX > -1000) {
          const mdx = mouseX - prevMouseX;
          const mdy = mouseY - prevMouseY;
          const moveDist = Math.sqrt(mdx * mdx + mdy * mdy);
          const jitter = Math.max(0, 14 - moveDist) * 0.6; // bigger jitter when still
          trail.push({
            x: mouseX + (Math.random() - 0.5) * jitter,
            y: mouseY + (Math.random() - 0.5) * jitter,
            t: now
          });
        }
        while (trail.length && (now - trail[0].t > TRAIL_MS || trail.length > TRAIL_MAX)) trail.shift();

        // Precompute per-trail-point velocity + stretch (once per frame, not per cell)
        // Stretch capped low so trail ellipses stay round-ish; each point also
        // gets a tiny random rotation so they don't all align in a sharp arrow.
        for (let i = 0; i < trail.length; i++) {
          const p = trail[i];
          const prev = i > 0 ? trail[i - 1] : p;
          const vx = p.x - prev.x;
          const vy = p.y - prev.y;
          const sp = Math.sqrt(vx * vx + vy * vy);
          p.sp = sp;
          if (sp > 0.6) {
            // Rotate stretch axis by a small random jitter
            if (p.axisJit === undefined) p.axisJit = (Math.random() - 0.5) * 0.6;
            const ca = Math.cos(p.axisJit), sa = Math.sin(p.axisJit);
            const uxn = vx / sp, uyn = vy / sp;
            p.ux = uxn * ca - uyn * sa;
            p.uy = uxn * sa + uyn * ca;
            // Much gentler stretching — max ~1.45×
            p.stretch = 1 + Math.min(0.45, sp * 0.025);
          } else {
            p.ux = 0; p.uy = 0; p.stretch = 1;
          }
          // Per-point wobble phase (used inside trail loop for organic edges)
          if (p.wob === undefined) p.wob = Math.random() * Math.PI * 2;
        }

        // Bounding box of the trail (so cells far away can skip the inner loop)
        let bbMinX = Infinity, bbMinY = Infinity, bbMaxX = -Infinity, bbMaxY = -Infinity;
        for (let i = 0; i < trail.length; i++) {
          const p = trail[i];
          if (p.x < bbMinX) bbMinX = p.x;
          if (p.x > bbMaxX) bbMaxX = p.x;
          if (p.y < bbMinY) bbMinY = p.y;
          if (p.y > bbMaxY) bbMaxY = p.y;
        }
        // Pad must cover BOTH the stretched trail ellipses AND the head
        // wobble extent — otherwise contribution gets clipped against the
        // rectangular bbox and you see straight edges in the blob.
        let maxStretch = 1;
        for (let i = 0; i < trail.length; i++) {
          if (trail[i].stretch > maxStretch) maxStretch = trail[i].stretch;
        }
        const bbPad = Math.max(RADIUS * maxStretch, HEAD_RADIUS * 1.5) + 40;
        const bbMinC = Math.max(0, Math.floor((bbMinX - bbPad) / CHAR_W));
        const bbMaxC = Math.min(cols, Math.ceil((bbMaxX + bbPad) / CHAR_W));
        const bbMinR = Math.max(0, Math.floor((bbMinY - bbPad) / CHAR_H));
        const bbMaxR = Math.min(rows, Math.ceil((bbMaxY + bbPad) / CHAR_H));

        // White wipe
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);

        // Shimmer: swap a small fraction of cell chars each frame
        // (cells affected by mouse swap faster — see inner loop)
        // Periodically refresh a SQL snippet so something readable cycles in.
        if (now - lastSnippetStamp > 1800) {
          stampSnippet();
          lastSnippetStamp = now;
        }

        const lastColor = COLORS.length - 1;
        const cx = width * 0.5;
        const cy = height * 0.5;
        const swirlT = now * 0.00015;

        // Walk every cell. Threshold prevents drawing invisible glyphs.
        // For each cell compute brightness from:
        //   1) background swirl (very subtle, spiral-arm pattern)
        //   2) idle shimmer (per-cell sine phase)
        //   3) mouse trail (sum of past positions with age decay)
        for (let r = 0; r < rows; r++) {
          const py = r * CHAR_H + CHAR_H * 0.5;
          for (let c = 0; c < cols; c++) {
            const idx = r * cols + c;
            const cell = cells[idx];
            if (!cell) continue;
            const px = c * CHAR_W + CHAR_W * 0.5;

            // --- background swirl ---
            // angle/dist from screen center, rotated slowly
            const ax = px - cx;
            const ay = py - cy;
            const ang = Math.atan2(ay, ax);
            const dC = Math.sqrt(ax * ax + ay * ay);
            // Spiral arms: 3 arms, rotating
            const swirl = 0.5 + 0.5 * Math.sin(ang * 3 + dC * 0.012 - swirlT * 4);
            // Fade the swirl toward edges so it doesn't overpower
            const swirlFalloff = Math.max(0, 1 - dC / (Math.max(width, height) * 0.75));
            let bright = swirl * swirlFalloff * 0.18;

            // --- idle shimmer ---
            bright += 0.04 + 0.05 * Math.sin(cell.phase + now * 0.0011);

            // --- mouse trail (velocity-stretched ellipses) + head wobble ---
            let trailBoost = 0;
            if (r >= bbMinR && r < bbMaxR && c >= bbMinC && c < bbMaxC) {
              for (let i = 0; i < trail.length; i++) {
                const p = trail[i];
                const dx = px - p.x;
                const dy = py - p.y;
                let warpedD2;
                if (p.sp > 0.6) {
                  const along = dx * p.ux + dy * p.uy;
                  const perp = -dx * p.uy + dy * p.ux;
                  const a = along / p.stretch;
                  warpedD2 = a * a + perp * perp;
                } else {
                  warpedD2 = dx * dx + dy * dy;
                }
                if (warpedD2 > RADIUS2 * 1.3) continue;
                // Per-trail-point angular wobble — each ellipse has an
                // independent wobble phase so the union doesn't look like a
                // perfect arrow when points align.
                const localAng = Math.atan2(dy, dx);
                const wob = 1
                  + 0.22 * Math.sin(localAng * 3 + now * 0.0028 + p.wob)
                  + 0.14 * Math.sin(localAng * 5 - now * 0.0019 + p.wob * 1.7);
                const wRad = RADIUS * wob;
                const d = Math.sqrt(warpedD2);
                if (d > wRad) continue;
                let f = 1 - d / wRad;
                f = f * f;
                const age = (now - p.t) / TRAIL_MS;
                const ageW = (1 - age) * (1 - age);
                trailBoost += f * ageW;
              }

              // Wobble blob at the smoothed head — animates over time, breaks the circle
              const hdx = px - mouseX;
              const hdy = py - mouseY;
              const hd2 = hdx * hdx + hdy * hdy;
              if (hd2 < HEAD_RADIUS2 * 1.4) {
                const ang = Math.atan2(hdy, hdx);
                const wobble =
                  1
                  + 0.34 * Math.sin(ang * 3 + now * 0.0022)
                  + 0.22 * Math.sin(ang * 5 - now * 0.0017)
                  + 0.14 * Math.sin(ang * 2 + now * 0.0014);
                const wr = HEAD_RADIUS * wobble;
                const hd = Math.sqrt(hd2);
                if (hd < wr) {
                  let hf = 1 - hd / wr;
                  hf = hf * hf;
                  trailBoost += hf * 0.85;
                }
              }
            }

            // Per-cell organic noise — breaks up the smooth gradient
            const organic =
              Math.sin(px * 0.018 + now * 0.0011) *
              Math.sin(py * 0.022 - now * 0.0008) * 0.5 + 0.5; // 0..1
            trailBoost *= 0.55 + organic * 0.9;

            // Compress so summed contributions don't blow past ~1
            trailBoost = 1 - Math.exp(-trailBoost * 1.4);
            bright += trailBoost * 0.95;

            // Mouse zone shimmers MORE — swap chars faster
            const mouseInfluence = trailBoost;
            const swapProb = cell.swap + mouseInfluence * 0.18;
            if (cell.stick > 0) {
              cell.stick--;
            } else if (Math.random() < swapProb) {
              cell.ch = pickChar();
            }

            if (bright < 0.08) continue; // below visibility threshold

            // Map brightness → color index. Even at peak we cap to keep it light.
            const colIdx = Math.min(lastColor, Math.floor(bright * (lastColor + 1)));
            ctx.fillStyle = COLORS[colIdx];
            ctx.fillText(cell.ch, c * CHAR_W, r * CHAR_H);
          }
        }
      }

      // ------------------------------------------------------------------
      // MODE 2 — 3D ASCII head (real 3D head mesh, sampled into ASCII grid)
      // ------------------------------------------------------------------
      // Renders LeePerrySmith.glb (a real human-head scan that ships with
      // three.js) into a tiny offscreen canvas sized to the ASCII grid.
      // Each cell reads the corresponding pixel's luminance, then we draw
      // the matching ASCII char + blue shade at that grid position.

      let headReady = false;
      let headError = null;
      let headGroup = null;
      let renderer3d = null;
      let scene3d = null;
      let camera3d = null;
      let offCanvas = null;   // 2D canvas we drawImage the WebGL output into
      let offCtx2d = null;
      let off3dW = 0, off3dH = 0;

      // fit  = target world-space size of the model's largest dimension
      //        (camera at z=2.6 with 26° FOV shows ~1.2 vertical units, so
      //        fit=2.0 means head overflows top+bottom → face fills frame)
      // yOff = world-space vertical offset AFTER scaling (negative = down,
      //        used to crop neck and put eyes near vertical center)
      const MODELS = {
        perry:     { url: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/LeePerrySmith/LeePerrySmith.glb',
                     fit: 2.1, yaw0: 0,        xOff: 0,    yOff: -0.45 },
        nefertiti: { url: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/Nefertiti/Nefertiti.glb',
                     fit: 1.8, yaw0: 0,        xOff: 0,    yOff: -0.25 },
        facecap:   { url: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/facecap.glb',
                     fit: 1.7, yaw0: Math.PI,  xOff: 0,    yOff: 0 }
      };
      let currentModel = 'perry';

      function initHead3D() {
        try {
          renderer3d = new THREE.WebGLRenderer({
            alpha: true,
            antialias: false,
            preserveDrawingBuffer: true
          });
          renderer3d.setClearColor(0x000000, 0);

          scene3d = new THREE.Scene();

          camera3d = new THREE.PerspectiveCamera(26, 1, 0.1, 100);
          camera3d.position.set(0, 0, 2.6);
          camera3d.lookAt(0, 0, 0);

          // Frontal-ish key light so center features (nose, lips, brow) catch
          // the brightest band. Side fill from opposite side. Back rim
          // outlines the silhouette.
          scene3d.add(new THREE.AmbientLight(0xffffff, 0.12));
          const key = new THREE.DirectionalLight(0xffffff, 1.4);
          key.position.set(-0.5, 0.85, 1.5);
          scene3d.add(key);
          const fill = new THREE.DirectionalLight(0xffffff, 0.22);
          fill.position.set(0.9, -0.1, 0.7);
          scene3d.add(fill);
          const rim = new THREE.DirectionalLight(0xffffff, 0.65);
          rim.position.set(0.3, 0.7, -1.2);
          scene3d.add(rim);

          offCanvas = document.createElement('canvas');
          offCtx2d = offCanvas.getContext('2d', { willReadFrequently: true });

          headGroup = new THREE.Group();
          scene3d.add(headGroup);

          loadHead(currentModel);
        } catch (e) {
          console.error(e);
          headError = 'webgl unavailable';
        }
      }

      // Supersample factor — render at 2× the ASCII grid so each cell's
      // luminance is averaged over a 2x2 pixel block (cleaner features).
      const SS = 2;

      // Build a 3-step gradient texture for toon shading. Hard luminance
      // bands let ASCII pick distinct chars per band → features actually read.
      let toonGradient = null;
      function buildToonGradient() {
        if (toonGradient) return toonGradient;
        const data = new Uint8Array([55, 165, 255]);
        const tex = new THREE.DataTexture(data, data.length, 1, THREE.RedFormat);
        tex.minFilter = THREE.NearestFilter;
        tex.magFilter = THREE.NearestFilter;
        tex.generateMipmaps = false;
        tex.needsUpdate = true;
        toonGradient = tex;
        return tex;
      }

      function loadHead(modelKey) {
        if (!MODELS[modelKey] || !headGroup) return;
        currentModel = modelKey;
        headReady = false;
        headError = null;
        // Dispose previously-loaded mesh resources
        while (headGroup.children.length > 0) {
          const child = headGroup.children[0];
          child.traverse((o) => {
            if (o.geometry) o.geometry.dispose();
            if (o.material) {
              if (Array.isArray(o.material)) o.material.forEach((m) => m.dispose());
              else o.material.dispose();
            }
          });
          headGroup.remove(child);
        }
        const cfg = MODELS[modelKey];
        const loader = new GLTFLoader();
        loader.load(
          cfg.url,
          (gltf) => {
            const root = gltf.scene;
            // Keep full geometry. Decimation made features unrecognizable.
            // Smooth-shaded toon material + dense head grid gives the best
            // readability we can get at this resolution.
            root.traverse((obj) => {
              if (obj.isMesh) {
                obj.material = new THREE.MeshToonMaterial({
                  color: 0xffffff,
                  gradientMap: buildToonGradient()
                });
                obj.frustumCulled = false;
              }
            });
            // Recenter, scale to fit, then apply offsets in WORLD units so
            // we can precisely crop (e.g. push the neck below the bottom).
            const box = new THREE.Box3().setFromObject(root);
            const center = box.getCenter(new THREE.Vector3());
            root.position.sub(center);
            const size = box.getSize(new THREE.Vector3());
            const fit = (cfg.fit || 1.3) / Math.max(size.x, size.y, size.z);
            root.scale.setScalar(fit);
            root.position.x += cfg.xOff || 0;
            root.position.y += cfg.yOff || 0;
            root.rotation.y = cfg.yaw0 || 0;
            headGroup.add(root);
            headReady = true;
          },
          undefined,
          (err) => {
            console.error('head load failed', err);
            headError = 'failed to load model: ' + modelKey;
          }
        );
      }

      function resize3D() {
        if (!renderer3d) return;
        // Use the DENSE head grid for offscreen rendering — gives 3-4× more
        // pixels per facial feature than the cursor-mode grid.
        off3dW = Math.max(2, headCols * SS);
        off3dH = Math.max(2, headRows * SS);
        renderer3d.setSize(off3dW, off3dH, false);
        offCanvas.width = off3dW;
        offCanvas.height = off3dH;
        camera3d.aspect = off3dW / off3dH;
        camera3d.updateProjectionMatrix();
      }

      // ------------------------------------------------------------------
      // MODE 2 — real 3D face (facecap, rendered normally — no ASCII)
      // ------------------------------------------------------------------
      const faceCanvasEl = document.getElementById('face');
      let faceRenderer = null, faceScene = null, faceCamera = null;
      let faceRoot = null, faceMesh = null;
      let faceReady = false, faceError = null;
      let faceCanvasW = 0, faceCanvasH = 0;
      let gazeYaw = 0, gazePitch = 0;
      let eyeLook = { h: 0, v: 0 };
      let eyeL = null, eyeR = null;          // facecap eyeball meshes (hidden)
      let eyeLCenter = null, eyeRCenter = null; // geometry centroids, in faceRoot-local space
      let curBlink = 0;
      const pupilLEl = document.getElementById('pupilL');
      const pupilREl = document.getElementById('pupilR');
      const _proj = new THREE.Vector3();
      // Project a faceRoot-local point to screen pixels (handles head rotation).
      function projectLocal(localVec) {
        _proj.copy(localVec).applyMatrix4(faceRoot.matrixWorld);
        _proj.project(faceCamera);
        return { x: (_proj.x * 0.5 + 0.5) * width, y: (-_proj.y * 0.5 + 0.5) * height };
      }
      // Geometry centroid of a mesh, expressed in faceRoot-local coordinates.
      function eyeCentroidLocal(mesh) {
        mesh.geometry.computeBoundingBox();
        const c = mesh.geometry.boundingBox.getCenter(new THREE.Vector3());
        mesh.localToWorld(c);
        faceRoot.worldToLocal(c);
        return c;
      }

      function initFace() {
        try {
          faceRenderer = new THREE.WebGLRenderer({ canvas: faceCanvasEl, antialias: true });
          faceRenderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
          faceRenderer.setSize(width, height, false);
          faceRenderer.outputColorSpace = THREE.SRGBColorSpace;
          faceRenderer.toneMapping = THREE.ACESFilmicToneMapping;
          faceRenderer.toneMappingExposure = 1.25; // brighter → ethereal, luminous
          faceCanvasW = width; faceCanvasH = height;

          faceScene = new THREE.Scene();
          faceScene.background = new THREE.Color(0xeef3fb); // light brand tint

          // Soft studio environment → realistic skin shading, no external files
          const pmrem = new THREE.PMREMGenerator(faceRenderer);
          faceScene.environment = pmrem.fromScene(new RoomEnvironment(), 0.02).texture;

          faceCamera = new THREE.PerspectiveCamera(24, width / height, 0.1, 100);
          faceCamera.position.set(0, 0, 2.8);

          const key = new THREE.DirectionalLight(0xffffff, 2.2);
          key.position.set(-1.2, 1.4, 2.2);
          faceScene.add(key);
          const rim = new THREE.DirectionalLight(0xd6e4ff, 1.0);
          rim.position.set(1.6, 0.4, -1.4);
          faceScene.add(rim);

          // facecap.glb: KTX2-compressed textures + Meshopt-compressed geometry
          const ktx2 = new KTX2Loader()
            .setTranscoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/basis/')
            .detectSupport(faceRenderer);
          const loader = new GLTFLoader()
            .setKTX2Loader(ktx2)
            .setMeshoptDecoder(MeshoptDecoder);
          loader.load(
            'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/facecap.glb',
            (gltf) => {
              faceRoot = gltf.scene;
              // Find the mesh that carries blink/expression morph targets
              faceRoot.traverse((o) => { if (o.isMesh && o.morphTargetInfluences) faceMesh = o; });
              if (!faceMesh) faceRoot.traverse((o) => { if (o.isMesh && !faceMesh) faceMesh = o; });
              // facecap eyeballs are separate meshes (mesh_0/mesh_1) that the
              // face morphs don't drive — hide them (their geometry showed as
              // "rings"); we render solid-circle pupils as a 2D overlay instead.
              faceRoot.traverse((o) => {
                if (o.name === 'mesh_0') eyeL = o;
                if (o.name === 'mesh_1') eyeR = o;
              });
              if (eyeL) eyeL.visible = false;
              if (eyeR) eyeR.visible = false;
              // Ethereal, androgynous material — soft cool-white matte with a
              // faint inner glow. Replaces the GLB's skin texture.
              faceRoot.traverse((o) => {
                if (o.isMesh) {
                  o.material = new THREE.MeshStandardMaterial({
                    color: 0xe4eaf3,
                    roughness: 0.74,
                    metalness: 0.0,
                    emissive: new THREE.Color(0x33508a),
                    emissiveIntensity: 0.07,
                    envMapIntensity: 1.2
                  });
                }
              });
              // Center + scale to frame the face
              // Scale FIRST, then center on the scaled bounding box (correct
              // order — centering before scaling threw the framing off).
              const size0 = new THREE.Box3().setFromObject(faceRoot).getSize(new THREE.Vector3());
              const fit = 1.95 / Math.max(size0.x, size0.y, size0.z); // larger than the screen
              faceRoot.scale.setScalar(fit);
              faceRoot.updateMatrixWorld(true);
              const cbox = new THREE.Box3().setFromObject(faceRoot);
              const center = cbox.getCenter(new THREE.Vector3());
              faceRoot.position.x -= center.x;
              faceRoot.position.y -= center.y;
              faceRoot.position.z -= center.z;
              faceRoot.position.y += 0.12; // eyes toward upper third, mouth stays visible
              faceScene.add(faceRoot);
              faceRoot.updateMatrixWorld(true);
              // Store eyeball geometry centroids (in faceRoot-local space) for
              // accurate pupil placement.
              if (eyeL) eyeLCenter = eyeCentroidLocal(eyeL);
              if (eyeR) eyeRCenter = eyeCentroidLocal(eyeR);
              faceReady = true;
              // Temporary debug handles for live tuning
              window.__coaFace = faceRoot;
              window.__coaMesh = faceMesh;
              window.__THREE = THREE;
              window.__coaMeshes = [];
              faceRoot.traverse((o) => { if (o.isMesh) window.__coaMeshes.push(o.name); });
              window.__coaMorphs = faceMesh && faceMesh.morphTargetDictionary
                ? Object.keys(faceMesh.morphTargetDictionary) : [];
            },
            undefined,
            (err) => { console.error('face load failed', err); faceError = 'failed to load face'; }
          );
        } catch (e) {
          console.error(e);
          faceError = 'webgl unavailable';
        }
      }

      function resizeFace() {
        if (!faceRenderer) return;
        faceRenderer.setSize(width, height, false);
        faceCamera.aspect = width / height;
        faceCamera.updateProjectionMatrix();
        faceCanvasW = width; faceCanvasH = height;
      }

      function drawFace(now) {
        if (faceError || !faceRenderer) return;
        if (faceCanvasW !== width || faceCanvasH !== height) resizeFace();

        if (faceReady && faceRoot) {
          // Mouse → gaze target (-1..1). Centered at rest.
          let nx = 0, ny = 0;
          if (targetX > -1000) {
            nx = (targetX / width) * 2 - 1;
            ny = (targetY / height) * 2 - 1;
          }
          // Very subtle, slow idle drift; symmetric around center.
          const idleYaw = Math.sin(now * 0.00016) * 0.022;
          const idlePitch = Math.sin(now * 0.00021 + 1.1) * 0.012;
          // Small head range, slow follow — most of the tracking is the eyes.
          const targetYaw = nx * 0.16 + idleYaw;
          const targetPitch = ny * 0.10 + idlePitch;
          gazeYaw += (targetYaw - gazeYaw) * 0.018;   // much slower
          gazePitch += (targetPitch - gazePitch) * 0.018;
          faceRoot.rotation.y = gazeYaw;
          faceRoot.rotation.x = gazePitch;

          // Smoothed eye-look value (drives the pupil overlay offset)
          eyeLook.h += (nx - eyeLook.h) * 0.08;
          eyeLook.v += (ny - eyeLook.v) * 0.08;

          // ---- Idle blink: infrequent + slow (closes facecap's eyelids) ----
          if (faceMesh && faceMesh.morphTargetInfluences && faceMesh.morphTargetDictionary) {
            const dict = faceMesh.morphTargetDictionary;
            const infl = faceMesh.morphTargetInfluences;
            const cycle = 10000;        // ~10s between blinks
            const blinkWin = 0.06;      // ~600ms blink duration
            const tt = (now % cycle) / cycle;
            let blink = 0;
            if (tt > (1 - blinkWin)) blink = Math.sin(((tt - (1 - blinkWin)) / blinkWin) * Math.PI);
            curBlink = blink;
            for (const name in dict) {
              if (name.toLowerCase().includes('blink')) infl[dict[name]] = blink;
            }
          }
        }

        faceRenderer.render(faceScene, faceCamera);

        // ---- Solid-circle pupils as a 2D overlay, tracking the cursor ----
        if (faceReady && eyeLCenter && eyeRCenter) {
          const pa = projectLocal(eyeLCenter);
          const pb = projectLocal(eyeRCenter);
          const inter = Math.hypot(pa.x - pb.x, pa.y - pb.y);
          const pr = Math.max(7, inter * 0.14);          // pupil radius scales with zoom
          const offX = eyeLook.h * pr * 0.75;            // shift toward cursor
          const offY = eyeLook.v * pr * 0.75;
          const op = (0.92 * (1 - curBlink)).toFixed(2); // fade out during blink
          const place = (p, el) => {
            el.style.width = el.style.height = (pr * 2) + 'px';
            el.style.left = (p.x + offX) + 'px';
            el.style.top = (p.y + offY) + 'px';
            el.style.opacity = op;
          };
          place(pa, pupilLEl);
          place(pb, pupilREl);
        }
      }

      initFace();
      window.addEventListener('resize', resizeFace);

      // L→R data flow streams (background for head mode)
      const STREAM_COUNT = 55;
      let streams = null;
      function newStream() {
        return {
          x: -8 - Math.random() * 90,
          y: (Math.random() * rows) | 0,
          speed: 0.25 + Math.random() * 0.9,
          length: 6 + ((Math.random() * 18) | 0),
          intensity: 0.18 + Math.random() * 0.32
        };
      }
      function ensureStreams() {
        if (!streams || streams.length !== STREAM_COUNT) {
          streams = new Array(STREAM_COUNT);
          for (let i = 0; i < STREAM_COUNT; i++) streams[i] = newStream();
        }
      }

      function drawHead(now) {
        // White wipe
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);

        // Switch to dense-grid font for this mode
        ctx.font = HEAD_FONT_SIZE + 'px "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace';

        if (headError) {
          ctx.fillStyle = '#94a8d6';
          ctx.fillText(headError, 24, height * 0.5);
          return;
        }

        // ---- Render head to offscreen ----
        let imgData = null;
        let hasHead = false;
        if (headReady && renderer3d) {
          if (off3dW !== headCols * SS || off3dH !== headRows * SS) resize3D();
          headGroup.rotation.y = Math.sin(now * 0.00035) * 0.32;
          headGroup.rotation.x = Math.sin(now * 0.00028 + 1.3) * 0.07;
          renderer3d.render(scene3d, camera3d);
          offCtx2d.clearRect(0, 0, off3dW, off3dH);
          offCtx2d.drawImage(renderer3d.domElement, 0, 0, off3dW, off3dH);
          imgData = offCtx2d.getImageData(0, 0, off3dW, off3dH).data;
          hasHead = true;
        }

        // Slow char shimmer on dense head cells
        const swapCount = Math.floor(headCells.length * 0.003);
        for (let i = 0; i < swapCount; i++) {
          const idx = (Math.random() * headCells.length) | 0;
          if (headCells[idx]) headCells[idx].ch = pickChar();
        }

        const lastColor = COLORS.length - 1;
        const ssW = off3dW;
        const HEAD_GAIN = 0.62;
        const HEAD_GAMMA = 0.80;
        const CAP = 0.82;

        for (let r = 0; r < headRows; r++) {
          const py = r * HEAD_CHAR_H + HEAD_CHAR_H * 0.5;
          for (let c = 0; c < headCols; c++) {
            const px = c * HEAD_CHAR_W + HEAD_CHAR_W * 0.5;
            const cell = headCells[r * headCols + c];
            if (!cell) continue;

            // Background: gentle wavy fill drifting L→R
            const w1 = 0.5 + 0.5 * Math.sin(px * 0.022 - now * 0.0005 + py * 0.012);
            const w2 = 0.5 + 0.5 * Math.sin(px * 0.010 - now * 0.0003 - py * 0.008);
            const sh = 0.5 + 0.5 * Math.sin(cell.phase + now * 0.0011);
            let bright = 0.09 + w1 * 0.08 + w2 * 0.04 + sh * 0.02;

            // Head contribution (2x supersampled per cell)
            if (hasHead) {
              const sx = c * SS;
              const sy = r * SS;
              const i0 = (sy * ssW + sx) * 4;
              const i1 = i0 + 4;
              const i2 = ((sy + 1) * ssW + sx) * 4;
              const i3 = i2 + 4;
              const aSum = imgData[i0 + 3] + imgData[i1 + 3] + imgData[i2 + 3] + imgData[i3 + 3];
              if (aSum > 24) {
                const lSum =
                  (imgData[i0] + imgData[i1] + imgData[i2] + imgData[i3]) * 0.299 +
                  (imgData[i0 + 1] + imgData[i1 + 1] + imgData[i2 + 1] + imgData[i3 + 1]) * 0.587 +
                  (imgData[i0 + 2] + imgData[i1 + 2] + imgData[i2 + 2] + imgData[i3 + 2]) * 0.114;
                let lum = lSum / (4 * 255);
                lum = Math.pow(lum, HEAD_GAMMA);
                const alphaW = Math.min(1, aSum / 800);
                bright += lum * HEAD_GAIN * alphaW;
              }
            }

            if (bright > CAP) bright = CAP;
            if (bright < 0.10) continue;

            const colIdx = Math.min(lastColor, Math.floor(bright * (lastColor + 1)));
            ctx.fillStyle = COLORS[colIdx];
            ctx.fillText(cell.ch, c * HEAD_CHAR_W, r * HEAD_CHAR_H);
          }
        }

        if (!hasHead) {
          ctx.fillStyle = '#aebbd9';
          ctx.fillText('loading head model…', 24, height * 0.5);
        }

        // Restore cursor-mode font for any subsequent draws
        ctx.font = FONT_SIZE + 'px "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace';
      }

      function draw(now) {
        if (mode === 'cursor') drawCursor(now);
        else drawFace(now);
        requestAnimationFrame(draw);
      }

      // ------------------------------------------------------------------
      // Nav + mode switching
      // ------------------------------------------------------------------
      const labelEl = document.getElementById('label');
      const navButtons = document.querySelectorAll('.nav > button');
      const asciiCanvasEl = document.getElementById('ascii');
      const vignetteEl = document.getElementById('vignette');
      function setMode(m) {
        mode = m;
        navButtons.forEach(b => b.classList.toggle('active', b.dataset.mode === m));
        labelEl.textContent = m === 'cursor' ? 'coa · cursor' : 'coa · face';
        document.body.style.cursor = m === 'cursor' ? 'crosshair' : 'default';
        asciiCanvasEl.style.display = m === 'cursor' ? 'block' : 'none';
        faceCanvasEl.style.display = m === 'face' ? 'block' : 'none';
        vignetteEl.style.display = m === 'face' ? 'block' : 'none';
        pupilLEl.style.display = m === 'face' ? 'block' : 'none';
        pupilREl.style.display = m === 'face' ? 'block' : 'none';
        if (m === 'face') resizeFace();
      }
      navButtons.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));

      requestAnimationFrame(draw);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>coa</title>
  <style>
    :root { --bg: #ffffff; --ink: #2a3b6b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--ink);
      cursor: crosshair;
    }
    canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }
    .label {
      position: fixed; left: 24px; bottom: 20px;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: #aebbd9; pointer-events: none; user-select: none; z-index: 2;
    }
    .nav {
      position: fixed; left: 24px; top: 22px; z-index: 3;
      display: flex; gap: 18px;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      user-select: none;
    }
    .nav button {
      background: transparent; border: none; padding: 0;
      font: inherit; letter-spacing: inherit; text-transform: inherit;
      color: #aebbd9; cursor: pointer;
      transition: color 0.15s ease;
    }
    .nav button:hover { color: #6b8ad0; }
    .nav button.active { color: #2547d9; }
    .nav .sep { color: #d6dcec; }
    .nav .model-picker { display: none; gap: 12px; align-items: center; }
    .nav .model-picker button { font-size: 10px; opacity: 0.85; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="ascii"></canvas>
  <nav class="nav">
    <button data-mode="cursor" class="active">01 · cursor</button>
    <button data-mode="head">02 · head</button>
    <span class="sep" id="modelSep" style="display:none">/</span>
    <span class="model-picker" id="modelPicker">
      <button data-model="perry" class="active">perry</button>
      <button data-model="nefertiti">nefertiti</button>
      <button data-model="facecap">facecap</button>
    </span>
  </nav>
  <div class="label" id="label">coa · ascii</div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    {
      const canvas = document.getElementById('ascii');
      const ctx = canvas.getContext('2d');

      // ---- Character pool: SQL keywords, code symbols, hex ----
      const SQL_TOKENS = [
        'SELECT','FROM','WHERE','JOIN','LEFT','RIGHT','INNER','OUTER','ON','AS',
        'GROUP','ORDER','BY','LIMIT','OFFSET','HAVING','UNION','DISTINCT',
        'INSERT','UPDATE','DELETE','CREATE','TABLE','VIEW','INDEX','WITH',
        'AND','OR','NOT','NULL','IS','IN','LIKE','BETWEEN','CASE','WHEN','THEN','ELSE','END',
        'COUNT','SUM','AVG','MIN','MAX','CAST','COALESCE','EXISTS'
      ];
      const SYMBOLS = '{}[]()<>;,.=+-*/_:|&%@#$!?\\"\'`~^';
      const HEX = '0123456789abcdef';
      const LETTERS = 'abcdefghijklmnopqrstuvwxyz';

      // Build a flat char pool weighted toward symbols + hex (Matrix-y feel),
      // and a list of multi-char SQL snippets we'll occasionally stamp across cells.
      const CHAR_POOL = [];
      for (let i = 0; i < 3; i++) for (const c of SYMBOLS) CHAR_POOL.push(c);
      for (let i = 0; i < 2; i++) for (const c of HEX) CHAR_POOL.push(c);
      for (let i = 0; i < 1; i++) for (const c of LETTERS) CHAR_POOL.push(c);
      const SNIPPETS = [
        'SELECT * FROM','WHERE id =','JOIN ON','GROUP BY','ORDER BY DESC',
        'COUNT(*)','IS NULL','LIMIT 100','CREATE TABLE','INSERT INTO',
        'NOT NULL','LEFT JOIN','UNION ALL','CASE WHEN','COALESCE(','AS coa',
        'WITH cte AS','SUM(amount)','AVG(price)','HAVING COUNT'
      ];

      function pickChar() {
        return CHAR_POOL[(Math.random() * CHAR_POOL.length) | 0];
      }

      // ---- Color ramp: light powder → mid blue (no dark / no navy) ----
      // Lower indices = paler. Highest still feels soft.
      const COLORS = [
        'rgba(225, 234, 250, 1)',
        'rgba(206, 220, 246, 1)',
        'rgba(180, 201, 240, 1)',
        'rgba(151, 179, 232, 1)',
        'rgba(124, 158, 222, 1)',
        'rgba(102, 140, 212, 1)',
        'rgba(86, 124, 200, 1)'
      ];

      // ---- Grid: tight 9pt characters ----
      const CHAR_W = 6;
      const CHAR_H = 9;
      const FONT_SIZE = 9;

      let dpr = Math.max(1, window.devicePixelRatio || 1);
      let width = 0, height = 0, cols = 0, rows = 0;
      let cells = [];                          // per-cell state
      let mouseX = -9999, mouseY = -9999;
      let prevMouseX = -9999, prevMouseY = -9999;
      let targetX = -9999, targetY = -9999;
      let trail = [];                          // history of mouse points
      const TRAIL_MS = 1100;                   // tail lifetime
      const TRAIL_MAX = 26;                    // hard cap
      const RADIUS = 210;                      // base blob radius
      const RADIUS2 = RADIUS * RADIUS;
      const HEAD_RADIUS = 240;                 // wobble field extent
      const HEAD_RADIUS2 = HEAD_RADIUS * HEAD_RADIUS;

      function buildCells() {
        cells = new Array(cols * rows);
        for (let i = 0; i < cells.length; i++) {
          cells[i] = {
            ch: pickChar(),
            phase: Math.random() * Math.PI * 2,
            swap: 0.004 + Math.random() * 0.018, // baseline char-swap probability per frame
            stick: 0                              // snippet stickiness (frames remaining before allowed to swap)
          };
        }
        // Sprinkle a handful of SQL snippets across the grid for flavor.
        const targetSnippets = Math.max(8, Math.floor((cols * rows) / 4000));
        for (let s = 0; s < targetSnippets; s++) stampSnippet();
      }

      function stampSnippet() {
        const snip = SNIPPETS[(Math.random() * SNIPPETS.length) | 0];
        const startX = Math.floor(Math.random() * Math.max(1, cols - snip.length));
        const y = Math.floor(Math.random() * rows);
        for (let i = 0; i < snip.length; i++) {
          const idx = y * cols + (startX + i);
          if (!cells[idx]) continue;
          cells[idx].ch = snip[i];
          cells[idx].stick = 240 + Math.floor(Math.random() * 240); // hold for a few seconds
        }
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        dpr = Math.max(1, window.devicePixelRatio || 1);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        cols = Math.ceil(width / CHAR_W) + 1;
        rows = Math.ceil(height / CHAR_H) + 1;
        ctx.font = FONT_SIZE + 'px "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.textBaseline = 'top';
        buildCells();
      }

      function onMove(e) {
        const t = e.touches ? e.touches[0] : e;
        targetX = t.clientX;
        targetY = t.clientY;
      }
      function onLeave() {
        targetX = -9999;
        targetY = -9999;
      }

      window.addEventListener('resize', resize);
      window.addEventListener('mousemove', onMove, { passive: true });
      window.addEventListener('touchmove', onMove, { passive: true });
      window.addEventListener('mouseleave', onLeave);
      window.addEventListener('blur', onLeave);

      resize();

      let lastSnippetStamp = 0;
      let frame = 0;
      let mode = 'cursor';

      function drawCursor(now) {
        frame++;

        // Smooth follow (slower so trail extends behind during motion)
        if (mouseX === -9999) { mouseX = targetX; mouseY = targetY; prevMouseX = mouseX; prevMouseY = mouseY; }
        else if (targetX > -1000) {
          prevMouseX = mouseX; prevMouseY = mouseY;
          mouseX += (targetX - mouseX) * 0.16;
          mouseY += (targetY - mouseY) * 0.16;
        }

        // Push current mouse position into trail, with jitter so resting
        // blob still shifts shape from frame to frame.
        if (targetX > -1000) {
          const mdx = mouseX - prevMouseX;
          const mdy = mouseY - prevMouseY;
          const moveDist = Math.sqrt(mdx * mdx + mdy * mdy);
          const jitter = Math.max(0, 14 - moveDist) * 0.6; // bigger jitter when still
          trail.push({
            x: mouseX + (Math.random() - 0.5) * jitter,
            y: mouseY + (Math.random() - 0.5) * jitter,
            t: now
          });
        }
        while (trail.length && (now - trail[0].t > TRAIL_MS || trail.length > TRAIL_MAX)) trail.shift();

        // Precompute per-trail-point velocity + stretch (once per frame, not per cell)
        for (let i = 0; i < trail.length; i++) {
          const p = trail[i];
          const prev = i > 0 ? trail[i - 1] : p;
          const vx = p.x - prev.x;
          const vy = p.y - prev.y;
          const sp = Math.sqrt(vx * vx + vy * vy);
          p.sp = sp;
          if (sp > 0.6) {
            p.ux = vx / sp;
            p.uy = vy / sp;
            p.stretch = 1 + Math.min(2.6, sp * 0.10);
          } else {
            p.ux = 0; p.uy = 0; p.stretch = 1;
          }
        }

        // Bounding box of the trail (so cells far away can skip the inner loop)
        let bbMinX = Infinity, bbMinY = Infinity, bbMaxX = -Infinity, bbMaxY = -Infinity;
        for (let i = 0; i < trail.length; i++) {
          const p = trail[i];
          if (p.x < bbMinX) bbMinX = p.x;
          if (p.x > bbMaxX) bbMaxX = p.x;
          if (p.y < bbMinY) bbMinY = p.y;
          if (p.y > bbMaxY) bbMaxY = p.y;
        }
        // Pad must cover BOTH the stretched trail ellipses AND the head
        // wobble extent — otherwise contribution gets clipped against the
        // rectangular bbox and you see straight edges in the blob.
        let maxStretch = 1;
        for (let i = 0; i < trail.length; i++) {
          if (trail[i].stretch > maxStretch) maxStretch = trail[i].stretch;
        }
        const bbPad = Math.max(RADIUS * maxStretch, HEAD_RADIUS * 1.5) + 40;
        const bbMinC = Math.max(0, Math.floor((bbMinX - bbPad) / CHAR_W));
        const bbMaxC = Math.min(cols, Math.ceil((bbMaxX + bbPad) / CHAR_W));
        const bbMinR = Math.max(0, Math.floor((bbMinY - bbPad) / CHAR_H));
        const bbMaxR = Math.min(rows, Math.ceil((bbMaxY + bbPad) / CHAR_H));

        // White wipe
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);

        // Shimmer: swap a small fraction of cell chars each frame
        // (cells affected by mouse swap faster — see inner loop)
        // Periodically refresh a SQL snippet so something readable cycles in.
        if (now - lastSnippetStamp > 1800) {
          stampSnippet();
          lastSnippetStamp = now;
        }

        const lastColor = COLORS.length - 1;
        const cx = width * 0.5;
        const cy = height * 0.5;
        const swirlT = now * 0.00015;

        // Walk every cell. Threshold prevents drawing invisible glyphs.
        // For each cell compute brightness from:
        //   1) background swirl (very subtle, spiral-arm pattern)
        //   2) idle shimmer (per-cell sine phase)
        //   3) mouse trail (sum of past positions with age decay)
        for (let r = 0; r < rows; r++) {
          const py = r * CHAR_H + CHAR_H * 0.5;
          for (let c = 0; c < cols; c++) {
            const idx = r * cols + c;
            const cell = cells[idx];
            if (!cell) continue;
            const px = c * CHAR_W + CHAR_W * 0.5;

            // --- background swirl ---
            // angle/dist from screen center, rotated slowly
            const ax = px - cx;
            const ay = py - cy;
            const ang = Math.atan2(ay, ax);
            const dC = Math.sqrt(ax * ax + ay * ay);
            // Spiral arms: 3 arms, rotating
            const swirl = 0.5 + 0.5 * Math.sin(ang * 3 + dC * 0.012 - swirlT * 4);
            // Fade the swirl toward edges so it doesn't overpower
            const swirlFalloff = Math.max(0, 1 - dC / (Math.max(width, height) * 0.75));
            let bright = swirl * swirlFalloff * 0.18;

            // --- idle shimmer ---
            bright += 0.04 + 0.05 * Math.sin(cell.phase + now * 0.0011);

            // --- mouse trail (velocity-stretched ellipses) + head wobble ---
            let trailBoost = 0;
            if (r >= bbMinR && r < bbMaxR && c >= bbMinC && c < bbMaxC) {
              for (let i = 0; i < trail.length; i++) {
                const p = trail[i];
                const dx = px - p.x;
                const dy = py - p.y;
                let warpedD2;
                if (p.sp > 0.6) {
                  // project (dx,dy) onto velocity (along) and perpendicular
                  const along = dx * p.ux + dy * p.uy;
                  const perp = -dx * p.uy + dy * p.ux;
                  const a = along / p.stretch;
                  warpedD2 = a * a + perp * perp;
                } else {
                  warpedD2 = dx * dx + dy * dy;
                }
                if (warpedD2 > RADIUS2) continue;
                const d = Math.sqrt(warpedD2);
                let f = 1 - d / RADIUS;
                f = f * f;
                const age = (now - p.t) / TRAIL_MS;
                const ageW = (1 - age) * (1 - age);
                trailBoost += f * ageW;
              }

              // Wobble blob at the smoothed head — animates over time, breaks the circle
              const hdx = px - mouseX;
              const hdy = py - mouseY;
              const hd2 = hdx * hdx + hdy * hdy;
              if (hd2 < HEAD_RADIUS2 * 1.4) {
                const ang = Math.atan2(hdy, hdx);
                const wobble =
                  1
                  + 0.34 * Math.sin(ang * 3 + now * 0.0022)
                  + 0.22 * Math.sin(ang * 5 - now * 0.0017)
                  + 0.14 * Math.sin(ang * 2 + now * 0.0014);
                const wr = HEAD_RADIUS * wobble;
                const hd = Math.sqrt(hd2);
                if (hd < wr) {
                  let hf = 1 - hd / wr;
                  hf = hf * hf;
                  trailBoost += hf * 0.85;
                }
              }
            }

            // Per-cell organic noise — breaks up the smooth gradient
            const organic =
              Math.sin(px * 0.018 + now * 0.0011) *
              Math.sin(py * 0.022 - now * 0.0008) * 0.5 + 0.5; // 0..1
            trailBoost *= 0.55 + organic * 0.9;

            // Compress so summed contributions don't blow past ~1
            trailBoost = 1 - Math.exp(-trailBoost * 1.4);
            bright += trailBoost * 0.95;

            // Mouse zone shimmers MORE — swap chars faster
            const mouseInfluence = trailBoost;
            const swapProb = cell.swap + mouseInfluence * 0.18;
            if (cell.stick > 0) {
              cell.stick--;
            } else if (Math.random() < swapProb) {
              cell.ch = pickChar();
            }

            if (bright < 0.08) continue; // below visibility threshold

            // Map brightness → color index. Even at peak we cap to keep it light.
            const colIdx = Math.min(lastColor, Math.floor(bright * (lastColor + 1)));
            ctx.fillStyle = COLORS[colIdx];
            ctx.fillText(cell.ch, c * CHAR_W, r * CHAR_H);
          }
        }
      }

      // ------------------------------------------------------------------
      // MODE 2 — 3D ASCII head (real 3D head mesh, sampled into ASCII grid)
      // ------------------------------------------------------------------
      // Renders LeePerrySmith.glb (a real human-head scan that ships with
      // three.js) into a tiny offscreen canvas sized to the ASCII grid.
      // Each cell reads the corresponding pixel's luminance, then we draw
      // the matching ASCII char + blue shade at that grid position.

      let headReady = false;
      let headError = null;
      let headGroup = null;
      let renderer3d = null;
      let scene3d = null;
      let camera3d = null;
      let offCanvas = null;   // 2D canvas we drawImage the WebGL output into
      let offCtx2d = null;
      let off3dW = 0, off3dH = 0;

      const MODELS = {
        perry:     { url: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/LeePerrySmith/LeePerrySmith.glb',
                     fit: 1.3, yaw0: 0,        xOff: 0,    yOff: 0 },
        nefertiti: { url: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/Nefertiti/Nefertiti.glb',
                     fit: 1.4, yaw0: 0,        xOff: 0,    yOff: 0 },
        facecap:   { url: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/facecap.glb',
                     fit: 1.5, yaw0: Math.PI,  xOff: 0,    yOff: 0 }
      };
      let currentModel = 'perry';

      function initHead3D() {
        try {
          renderer3d = new THREE.WebGLRenderer({
            alpha: true,
            antialias: false,
            preserveDrawingBuffer: true
          });
          renderer3d.setClearColor(0x000000, 0);

          scene3d = new THREE.Scene();

          camera3d = new THREE.PerspectiveCamera(26, 1, 0.1, 100);
          camera3d.position.set(0, 0, 2.6);
          camera3d.lookAt(0, 0, 0);

          // Lower ambient + stronger key light = deeper shadows around nose/eyes/lips
          // so features actually read at low ASCII resolution.
          scene3d.add(new THREE.AmbientLight(0xffffff, 0.12));
          const key = new THREE.DirectionalLight(0xffffff, 1.35);
          key.position.set(-1.3, 1.05, 1.15);
          scene3d.add(key);
          // Small fill to keep the dark side from going pitch black
          const fill = new THREE.DirectionalLight(0xffffff, 0.18);
          fill.position.set(1.0, 0.1, 0.55);
          scene3d.add(fill);

          offCanvas = document.createElement('canvas');
          offCtx2d = offCanvas.getContext('2d', { willReadFrequently: true });

          headGroup = new THREE.Group();
          scene3d.add(headGroup);

          loadHead(currentModel);
        } catch (e) {
          console.error(e);
          headError = 'webgl unavailable';
        }
      }

      // Supersample factor — render at 2× the ASCII grid so each cell's
      // luminance is averaged over a 2x2 pixel block (cleaner features).
      const SS = 2;

      function loadHead(modelKey) {
        if (!MODELS[modelKey] || !headGroup) return;
        currentModel = modelKey;
        headReady = false;
        headError = null;
        // Dispose previously-loaded mesh resources
        while (headGroup.children.length > 0) {
          const child = headGroup.children[0];
          child.traverse((o) => {
            if (o.geometry) o.geometry.dispose();
            if (o.material) {
              if (Array.isArray(o.material)) o.material.forEach((m) => m.dispose());
              else o.material.dispose();
            }
          });
          headGroup.remove(child);
        }
        const cfg = MODELS[modelKey];
        const loader = new GLTFLoader();
        loader.load(
          cfg.url,
          (gltf) => {
            const root = gltf.scene;
            root.traverse((obj) => {
              if (obj.isMesh) {
                obj.material = new THREE.MeshPhongMaterial({
                  color: 0xffffff,
                  specular: 0xdddddd,
                  shininess: 24
                });
                obj.frustumCulled = false;
              }
            });
            // Recenter + scale to fit
            const box = new THREE.Box3().setFromObject(root);
            const center = box.getCenter(new THREE.Vector3());
            root.position.sub(center);
            root.position.x += cfg.xOff || 0;
            root.position.y += cfg.yOff || 0;
            const size = box.getSize(new THREE.Vector3());
            const fit = (cfg.fit || 1.3) / Math.max(size.x, size.y, size.z);
            root.scale.setScalar(fit);
            root.rotation.y = cfg.yaw0 || 0;
            headGroup.add(root);
            headReady = true;
          },
          undefined,
          (err) => {
            console.error('head load failed', err);
            headError = 'failed to load model: ' + modelKey;
          }
        );
      }

      function resize3D() {
        if (!renderer3d) return;
        off3dW = Math.max(2, cols * SS);
        off3dH = Math.max(2, rows * SS);
        renderer3d.setSize(off3dW, off3dH, false);
        offCanvas.width = off3dW;
        offCanvas.height = off3dH;
        camera3d.aspect = off3dW / off3dH;
        camera3d.updateProjectionMatrix();
      }

      initHead3D();

      // L→R data flow streams (background for head mode)
      const STREAM_COUNT = 55;
      let streams = null;
      function newStream() {
        return {
          x: -8 - Math.random() * 90,
          y: (Math.random() * rows) | 0,
          speed: 0.25 + Math.random() * 0.9,
          length: 6 + ((Math.random() * 18) | 0),
          intensity: 0.18 + Math.random() * 0.32
        };
      }
      function ensureStreams() {
        if (!streams || streams.length !== STREAM_COUNT) {
          streams = new Array(STREAM_COUNT);
          for (let i = 0; i < STREAM_COUNT; i++) streams[i] = newStream();
        }
      }

      function drawHead(now) {
        // White wipe
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);

        if (headError) {
          ctx.fillStyle = '#94a8d6';
          ctx.font = '12px ui-monospace, monospace';
          ctx.fillText(headError, 24, height * 0.5);
          ctx.font = FONT_SIZE + 'px "JetBrains Mono", ui-monospace, monospace';
          return;
        }

        // ---- Render head to offscreen (if ready) ----
        let imgData = null;
        let hasHead = false;
        if (headReady && renderer3d) {
          if (off3dW !== cols * SS || off3dH !== rows * SS) resize3D();
          // Slow yaw + tiny nod
          headGroup.rotation.y = Math.sin(now * 0.00035) * 0.6;
          headGroup.rotation.x = Math.sin(now * 0.00028 + 1.3) * 0.08;
          renderer3d.render(scene3d, camera3d);
          offCtx2d.clearRect(0, 0, off3dW, off3dH);
          offCtx2d.drawImage(renderer3d.domElement, 0, 0, off3dW, off3dH);
          imgData = offCtx2d.getImageData(0, 0, off3dW, off3dH).data;
          hasHead = true;
        }

        // Slow char shimmer — small swap rate
        const swapCount = Math.floor(cells.length * 0.005);
        for (let i = 0; i < swapCount; i++) {
          const idx = (Math.random() * cells.length) | 0;
          if (cells[idx]) cells[idx].ch = pickChar();
        }

        const lastColor = COLORS.length - 1;
        const ssW = off3dW;
        const HEAD_GAIN = 0.55;     // how much the head adds on top of background
        const HEAD_GAMMA = 0.85;    // <1 boosts shadows so features read
        const CAP = 0.78;           // cap on total brightness — keeps overall contrast soft

        for (let r = 0; r < rows; r++) {
          const py = r * CHAR_H + CHAR_H * 0.5;
          for (let c = 0; c < cols; c++) {
            const px = c * CHAR_W + CHAR_W * 0.5;
            const cell = cells[r * cols + c];
            if (!cell) continue;

            // ---- Background: gentle wavy fill, every cell painted ----
            // Two low-freq sines that drift slowly L→R + per-cell shimmer.
            const w1 = 0.5 + 0.5 * Math.sin(px * 0.022 - now * 0.0005 + py * 0.012);
            const w2 = 0.5 + 0.5 * Math.sin(px * 0.010 - now * 0.0003 - py * 0.008);
            const sh = 0.5 + 0.5 * Math.sin(cell.phase + now * 0.0011);
            let bright = 0.10 + w1 * 0.09 + w2 * 0.05 + sh * 0.02; // ~0.10–0.26

            // ---- Head contribution (2x supersampled luminance) ----
            if (hasHead) {
              const sx = c * SS;
              const sy = r * SS;
              const i0 = (sy * ssW + sx) * 4;
              const i1 = i0 + 4;
              const i2 = ((sy + 1) * ssW + sx) * 4;
              const i3 = i2 + 4;
              const aSum =
                imgData[i0 + 3] + imgData[i1 + 3] +
                imgData[i2 + 3] + imgData[i3 + 3];
              if (aSum > 24) {
                const lSum =
                  (imgData[i0] + imgData[i1] + imgData[i2] + imgData[i3]) * 0.299 +
                  (imgData[i0 + 1] + imgData[i1 + 1] + imgData[i2 + 1] + imgData[i3 + 1]) * 0.587 +
                  (imgData[i0 + 2] + imgData[i1 + 2] + imgData[i2 + 2] + imgData[i3 + 2]) * 0.114;
                let lum = lSum / (4 * 255);
                // Contrast boost: pushes lit areas brighter, shadows stay dark
                lum = Math.pow(lum, HEAD_GAMMA);
                // Alpha weight: soft silhouette edge blends into background
                const alphaW = Math.min(1, aSum / 800); // 0..1
                bright += lum * HEAD_GAIN * alphaW;
              }
            }

            if (bright > CAP) bright = CAP;
            if (bright < 0.10) continue;

            const colIdx = Math.min(lastColor, Math.floor(bright * (lastColor + 1)));
            ctx.fillStyle = COLORS[colIdx];
            ctx.fillText(cell.ch, c * CHAR_W, r * CHAR_H);
          }
        }

        // ---- "Loading" overlay until head ready ----
        if (!hasHead) {
          ctx.fillStyle = '#aebbd9';
          ctx.font = '11px ui-monospace, monospace';
          ctx.fillText('loading head model…', 24, height * 0.5);
          ctx.font = FONT_SIZE + 'px "JetBrains Mono", ui-monospace, monospace';
        }
      }

      function draw(now) {
        if (mode === 'cursor') drawCursor(now);
        else drawHead(now);
        requestAnimationFrame(draw);
      }

      // ------------------------------------------------------------------
      // Nav + mode switching
      // ------------------------------------------------------------------
      const labelEl = document.getElementById('label');
      const navButtons = document.querySelectorAll('.nav > button');
      const modelPicker = document.getElementById('modelPicker');
      const modelSep = document.getElementById('modelSep');
      const modelButtons = document.querySelectorAll('.model-picker button');
      function setMode(m) {
        mode = m;
        navButtons.forEach(b => b.classList.toggle('active', b.dataset.mode === m));
        labelEl.textContent = m === 'cursor' ? 'coa · cursor' : 'coa · ' + currentModel;
        document.body.style.cursor = m === 'cursor' ? 'crosshair' : 'default';
        modelPicker.style.display = m === 'head' ? 'inline-flex' : 'none';
        modelSep.style.display = m === 'head' ? 'inline' : 'none';
      }
      navButtons.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
      modelButtons.forEach(b => b.addEventListener('click', () => {
        modelButtons.forEach(x => x.classList.toggle('active', x === b));
        loadHead(b.dataset.model);
        labelEl.textContent = 'coa · ' + b.dataset.model;
      }));

      requestAnimationFrame(draw);
    }
  </script>
</body>
</html>
